name: Daily arXiv Paper Fetch and Filter

on:
  schedule:
    # Runs 'at 00:00 UTC' every day (08:00 CST / Beijing time)
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual triggering

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # Needed to push changes back to the repository
      pages: write        # Needed to deploy to GitHub Pages
      id-token: write     # Needed for OpenID Connect authentication with GitHub Pages

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x' # Use the latest available 3.x version

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run script to fetch, filter, and generate report
      env:
        OPENROUTER_API_URL: ${{ vars.OPENROUTER_API_URL }}
        OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        MODEL_NAME: ${{ vars.MODEL_NAME }}
        EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
        EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
        EMAIL_SMTP_SERVER: ${{ secrets.EMAIL_SMTP_SERVER }}
        EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT }}
        EMAIL_SENDER_PASSWORD: ${{ secrets.EMAIL_SENDER_PASSWORD }}
        EMAIL_SENDER_NAME: ${{ vars.EMAIL_SENDER_NAME }}
        EMAIL_SUBJECT_PREFIX: ${{ vars.EMAIL_SUBJECT_PREFIX }}
        EMAIL_SEND_EMPTY: ${{ vars.EMAIL_SEND_EMPTY }}
        EMAIL_MAX_ITEMS: ${{ vars.EMAIL_MAX_ITEMS }}
        PAGES_BASE_URL: https://spbnb.github.io/Medical-Robotics-paper-daily.github.io/
      run: python src/main.py --backfill

    - name: Commit and push changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add daily_json/ daily_html/ index.html reports.json search_index.json search.html list.html
        # Check if there are changes to commit
        if git diff --staged --quiet; then
          echo "No changes to commit."
        else
          git commit -m "Update daily arXiv papers $(date +'%Y-%m-%d')"
          git push
        fi

