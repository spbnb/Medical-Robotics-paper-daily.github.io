<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>论文检索 - ArXiv Robotics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/minisearch@7/dist/umd/index.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .highlight { background-color: #f3e8ff; border-radius: 2px; padding: 0 2px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-4xl">
        <h1 class="text-3xl font-bold text-center text-slate-800 mb-2">论文检索</h1>
        <p class="text-center text-slate-500 mb-6">
            <a href="./index.html" class="text-purple-700 hover:underline">首页</a>
            &nbsp;·&nbsp;
            <a href="./list.html" class="text-purple-700 hover:underline">报告列表</a>
        </p>

        <div class="mb-6">
            <input id="search-input" type="text" placeholder="输入关键词搜索标题、摘要或作者..."
                class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-purple-500 text-lg">
        </div>
        <div id="status" class="text-center text-slate-400 mb-4">正在加载索引...</div>
        <div id="results" class="space-y-4"></div>
    </div>

    <script>
        let papersMap = {};
        let miniSearch;
        const input = document.getElementById('search-input');
        const resultsDiv = document.getElementById('results');
        const statusDiv = document.getElementById('status');

        fetch('search_index.json?v=' + Date.now())
            .then(r => {
                if (!r.ok) throw new Error(`HTTP ${r.status}`);
                return r.json();
            })
            .then(data => {
                // 为每条记录添加 id，并预处理 authors 为字符串
                data.forEach((p, i) => {
                    p.id = i;
                    p.authorsText = (p.authors || []).join(', ');
                });
                papersMap = Object.fromEntries(data.map(p => [p.id, p]));

                miniSearch = new MiniSearch({
                    fields: ['title', 'summary', 'summary_zh', 'tldr', 'tldr_zh', 'authorsText'],
                    storeFields: ['title', 'summary', 'summary_zh', 'tldr', 'tldr_zh', 'url', 'date', 'authors', 'authorsText', 'categories', 'score'],
                    searchOptions: {
                        boost: { title: 5, authorsText: 3, tldr: 2, tldr_zh: 2, summary: 1, summary_zh: 1 },
                        combineWith: 'AND',
                        fuzzy: (term) => term.length > 5 ? 0.2 : false,
                        prefix: (term) => term.length >= 3,
                    },
                });
                miniSearch.addAll(data);
                statusDiv.textContent = `索引加载完成，共 ${data.length} 篇论文。输入关键词开始搜索。`;
                input.focus();
            })
            .catch(err => {
                console.error('Search index error:', err);
                statusDiv.innerHTML = `<span class="text-red-500">加载搜索索引失败: ${err.message}</span>`;
            });

        let debounceTimer;
        input.addEventListener('input', () => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(doSearch, 200);
        });

        function doSearch() {
            const query = input.value.trim();
            resultsDiv.innerHTML = '';
            if (!query || !miniSearch) {
                const total = Object.keys(papersMap).length;
                statusDiv.textContent = total ? `共 ${total} 篇论文。输入关键词开始搜索。` : '正在加载索引...';
                return;
            }
            const results = miniSearch.search(query);
            statusDiv.textContent = `找到 ${results.length} 篇匹配论文`;
            const shown = results.slice(0, 100);
            shown.forEach(r => {
                const p = papersMap[r.id];
                const card = document.createElement('div');
                card.className = 'bg-white rounded-lg shadow p-4 hover:shadow-md transition';
                const desc = p.tldr_zh || p.tldr || '';
                card.innerHTML = `
                    <div class="flex items-start justify-between gap-2 mb-1">
                        <a href="${p.url}" target="_blank" class="text-purple-700 font-semibold hover:underline leading-snug">${esc(p.title)}</a>
                        <span class="shrink-0 text-xs bg-purple-100 text-purple-700 px-2 py-0.5 rounded">${p.date}</span>
                    </div>
                    <p class="text-slate-500 text-xs mb-1 italic">${esc(p.authorsText)}</p>
                    <p class="text-slate-600 text-sm mb-2">${esc(desc)}</p>
                    <div class="flex items-center gap-3 text-xs text-slate-400">
                        <span>${(p.categories || []).join(', ')}</span>
                        ${p.score ? '<span>⭐ ' + p.score + '</span>' : ''}
                    </div>`;
                resultsDiv.appendChild(card);
            });
            if (results.length > 100) {
                const more = document.createElement('p');
                more.className = 'text-center text-slate-400 text-sm';
                more.textContent = `仅显示前 100 条结果，共 ${results.length} 条匹配。请缩小搜索范围。`;
                resultsDiv.appendChild(more);
            }
        }

        function esc(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }
    </script></body>
</html>
